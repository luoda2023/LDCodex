<!DOCTYPE html><html lang="zh-CN" data-theme="light"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>视觉模型 - LUODA中转路由</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}:root{  --font-display:'PingFang SC','Microsoft YaHei','SimHei',sans-serif;  --font-body:'PingFang SC','Microsoft YaHei','SimHei',sans-serif;  --mono:'JetBrains Mono','SF Mono','Cascadia Code',monospace;  --primary:#165DFF;--primary-hover:#0E4FD0;--primary-light:#4080FF;  --primary-subtle:rgba(22,101,255,0.08);  --bg:#F2F4F8;--surface:#FFFFFF;--sidebar-bg:#F8F9FC;  --text:#181B24;--text-2:#484E5E;--text-3:#8890A4;  --border:#E3E6ED;--border-light:#EBEEF4;  --success:#00B42A;--danger:#F53F3F;--warning:#FF7D00;  --shadow-sm:0 1px 2px rgba(0,0,0,0.04);--shadow-md:0 4px 20px rgba(0,0,0,0.06);  --radius:14px;--radius-sm:10px;--radius-xs:6px;  --ease:cubic-bezier(0.16,1,0.3,1);}[data-theme="dark"]{  --bg:#0C0E15;--surface:#171A24;--sidebar-bg:#11131D;  --text:#E2E6F0;--text-2:#949CAE;--text-3:#5D647A;  --border:#262B38;--border-light:#1E2230;  --primary-subtle:rgba(22,101,255,0.12);  --shadow-sm:0 1px 2px rgba(0,0,0,0.2);--shadow-md:0 4px 20px rgba(0,0,0,0.25);}html,body{height:100%;overflow:hidden;font-family:var(--font-body);font-size:14px;line-height:1.5;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;}body{display:flex;}.app{display:flex;height:100vh;width:100vw;}/* sidebar */.sidebar{width:228px;min-width:228px;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:10;}.sidebar-logo{display:flex;align-items:center;gap:10px;padding:18px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}.sidebar-logo .logo-mrk{width:28px;height:28px;border-radius:8px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:15px;flex-shrink:0;}.sidebar-logo .logo-nm{white-space:nowrap;font-family:var(--font-display);font-size:1.1rem;font-weight:800;letter-spacing:-0.02em;color:var(--text);}.sidebar-logo .logo-bd{margin-left:auto;font-size:10px;font-weight:700;color:var(--primary);background:var(--primary-subtle);padding:2px 8px;border-radius:20px;margin-right:2px;}.sidebar-nav{flex:1;overflow-y:auto;padding:10px 8px;}.sidebar-nav::-webkit-scrollbar{width:0}.nav-sec{margin-bottom:18px;}.nav-sec-title{font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-3);padding:0 10px 8px;}.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-xs);color:var(--text-2);text-decoration:none;font-size:13px;font-weight:500;transition:all 0.15s;cursor:pointer;}.nav-item i{width:18px;text-align:center;font-size:14px;color:var(--text-3);transition:color 0.15s;}.nav-item:hover{background:var(--primary-subtle);color:var(--text);}.nav-item:hover i{color:var(--primary);}.nav-item.active{background:var(--primary-subtle);color:var(--primary);font-weight:600;}.nav-item.active i{color:var(--primary);}.nav-sub{padding-left:34px!important;font-size:12px;}.nav-badge{margin-left:auto;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(0,180,42,0.1);color:var(--success);}.sidebar-cta{margin:8px;padding:14px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--primary),#1A4FBF);color:#fff;flex-shrink:0;position:relative;overflow:hidden;}.sidebar-cta::before{content:'';position:absolute;top:-50%;right:-50%;width:100%;height:100%;background:radial-gradient(circle,rgba(255,255,255,0.1)0%,transparent 70%);pointer-events:none;}.sidebar-cta .cta-icon{font-size:1.3rem;margin-bottom:6px;}.sidebar-cta .cta-title{font-weight:700;font-size:13px;margin-bottom:4px;}.sidebar-cta .cta-desc{font-size:11px;opacity:0.8;margin-bottom:10px;line-height:1.4;}.sidebar-cta .cta-btn{width:100%;padding:7px;background:rgba(255,255,255,0.2);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,0.15);border-radius:var(--radius-xs);color:#fff;font-family:var(--font-display);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;}.sidebar-cta .cta-btn:hover{background:rgba(255,255,255,0.3);}.sidebar-footer{padding:6px 8px;border-top:1px solid var(--border);flex-shrink:0;}.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}.header{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;height:54px;}.h-left{display:flex;align-items:center;gap:20px;}.h-right{display:flex;align-items:center;gap:16px;}.h-actions{display:flex;align-items:center;gap:8px;}.h-icon-btn{width:32px;height:32px;border-radius:var(--radius-xs);border:none;background:transparent;color:var(--text-3);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}.h-icon-btn:hover{background:var(--bg);color:var(--text);}.content{flex:1;overflow-y:auto;padding:20px 24px 24px;}.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:16px;}.card-header{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--border);font-weight:600;font-size:14px;}.card-body{padding:16px 20px;}.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:var(--radius-xs);border:1px solid var(--border);background:var(--surface);color:var(--text-2);font-family:var(--font-display);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;white-space:nowrap;}.btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-subtle);}.btn-p{background:var(--primary);border-color:var(--primary);color:#fff;}.btn-p:hover{background:var(--primary-hover);border-color:var(--primary-hover);color:#fff;box-shadow:0 2px 8px rgba(22,101,255,0.25);}.btn-d{background:transparent;border-color:var(--danger);color:var(--danger);}.btn-d:hover{background:var(--danger);color:#fff;}.btn-s{background:transparent;border-color:var(--success);color:var(--success);}.btn-s:hover{background:var(--success);color:#fff;}/* ── Vision-specific styles ── */.form-row{display:flex;flex-direction:column;gap:4px;margin-bottom:14px;}.form-row label{font-size:13px;font-weight:600;color:var(--text-2);}.form-row input,.form-row select{padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-xs);font-size:13px;color:var(--text);background:var(--bg);outline:none;transition:border 0.15s;}.form-row input:focus,.form-row select:focus{border-color:var(--primary);}.form-row .hint{font-size:11px;color:var(--text-3);}.form-actions{display:flex;gap:8px;justify-content:flex-end;padding-top:8px;}.import-hint{font-size:12px;color:var(--text-3);padding:6px 12px;background:var(--border-light);border-radius:var(--radius-xs);margin-top:4px;}.model-list{display:flex;flex-direction:column;gap:8px;}.model-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--bg);border:1px solid var(--border-light);border-radius:var(--radius-sm);}.model-item.active{border-color:var(--primary);background:var(--primary-subtle);}.model-item .info{flex:1;min-width:0;}.model-item .name{font-weight:600;font-size:13px;display:flex;align-items:center;gap:6px;}.model-item .name .active-badge{font-size:10px;background:var(--primary);color:#fff;padding:1px 6px;border-radius:8px;}.model-item .detail{font-size:12px;color:var(--text-3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px;}.model-item .actions{display:flex;gap:6px;flex-shrink:0;}.model-item .actions button{font-size:12px;padding:4px 10px;}.empty{text-align:center;padding:40px 20px;color:var(--text-3);font-size:13px;}</style></head><body><div id="sidebarRoot"></div><main class="main">  <header class="header">    <div class="h-left">      <span style="font-weight:700;font-size:15px;">视觉模型管理</span>    </div>    <div class="h-right">      <div class="h-actions">        <button class="h-icon-btn" onclick="toggleTheme()" aria-label="切换主题"><i class="fa-solid fa-moon" id="themeIcon"></i></button>      </div>    </div>  </header>  <div class="content">    <!-- Add Form -->    <div class="card">      <div class="card-header"><i class="fas fa-plus" style="color:var(--primary);"></i> 添加视觉模型</div>      <div class="card-body">        <!-- Import from custom models -->        <div class="form-row">          <label><i class="fas fa-copy" style="margin-right:4px;"></i>从自定义模型导入</label>          <select id="importSelect" onchange="onImportSelect()">            <option value="">— 选择自定义模型 —</option>          </select>          <span class="import-hint">选择后自动填入接口地址、Key 和模型名称，可直接保存</span>        </div>        <div style="border-top:1px solid var(--border-light);margin:6px 0 14px;"></div>        <div class="form-row">          <label>名称</label>          <input type="text" id="fName" placeholder="如: 阿里云 qwen3.7-plus">          <span class="hint">给你的视觉模型起个名字，方便识别</span>        </div>        <div class="form-row">          <label>接口地址 (Base URL)</label>          <input type="text" id="fBase" placeholder="https://dashscope.aliyuncs.com/compatible-mode/v1">        </div>        <div class="form-row">          <label>API Key</label>          <input type="password" id="fKey" placeholder="sk-...">        </div>        <div class="form-row">          <label>模型名称 (Model)</label>          <input type="text" id="fModel" placeholder="qwen3.7-plus">          <span class="hint">模型 ID，如 qwen3.7-plus、GLM-4.6V</span>        </div>        <div class="form-actions">          <button class="btn" onclick="clearForm()">清空</button>          <button class="btn btn-p" onclick="saveModel()">保存模型</button>        </div>      </div>    </div>    <!-- Model List -->    <div class="card">      <div class="card-header"><i class="fas fa-list" style="color:var(--text-3);"></i> 已保存的视觉模型 <span id="modelCount" style="font-size:12px;font-weight:400;color:var(--text-3);margin-left:4px;"></span></div>      <div class="card-body">        <div class="model-list" id="modelList">          <div class="empty">加载中...</div>        </div>      </div>    </div>  </div></main><script src="shared/state.js"></script><script src="shared/sidebar.js"></script><script src="shared/auth.js"></script><script>(function(){var t=localStorage.getItem('luoda-theme')||'light';document.documentElement.setAttribute('data-theme',t);document.getElementById('themeIcon').className=t==='dark'?'fa-solid fa-sun':'fa-solid fa-moon';LUODA_SIDEBAR.inject('vision-models');})();function toggleTheme(){var h=document.documentElement;var c=h.getAttribute('data-theme');var n=c==='dark'?'light':'dark';h.setAttribute('data-theme',n);localStorage.setItem('luoda-theme',n);document.getElementById('themeIcon').className=n==='dark'?'fa-solid fa-sun':'fa-solid fa-moon';}var CONFIG_API = 'http://47.114.75.115:40001';var _editId = null;/* ── Load custom models into dropdown ── */function loadImportOptions() {  fetch(CONFIG_API + '/api/vision-candidates')    .then(function(r){return r.json()})    .then(function(data){      var sel = document.getElementById('importSelect');      var providers = data || [];      sel.innerHTML = '<option value="">— 选择自定义模型 —</option>';      providers.forEach(function(p){        var opt = document.createElement('option');        opt.value = p.idx || '';        opt.dataset.name = p.name;        opt.dataset.base = p.base;        opt.dataset.key = p.fullKey;        opt.dataset.model = p.modelId;        opt.textContent = p.name + ' (' + p.modelId + ')';        sel.appendChild(opt);      });    })    .catch(function(e){ /* silently fail */ });}function onImportSelect() {  var sel = document.getElementById('importSelect');  var opt = sel.options[sel.selectedIndex];  if (!opt || !opt.value) return;  document.getElementById('fName').value = opt.dataset.name || '';  document.getElementById('fBase').value = opt.dataset.base || '';  document.getElementById('fKey').value = opt.dataset.key || '';  document.getElementById('fModel').value = opt.dataset.model || '';}/* ── Load vision model list ── */function loadVisionModels() {  fetch(CONFIG_API + '/api/vision-models')    .then(function(r){return r.json()})    .then(function(data){      var list = data.list || [];      var active = data.active;      var el = document.getElementById('modelList');      document.getElementById('modelCount').textContent = '(' + list.length + ' 个)';      if (list.length === 0) {        el.innerHTML = '<div class="empty">暂无保存的视觉模型，上方添加。</div>';        return;      }      el.innerHTML = list.map(function(m){        var isActive = m.active;        var nameHtml = '<span class="name"><i class="fas fa-eye" style="width:16px;color:var(--text-3);font-size:12px;"></i> ' + escapeHtml(m.name) + (isActive ? ' <span class="active-badge">当前使用</span>' : '') + '</span>';        var detailHtml = '<div class="detail">' + escapeHtml(m.model) + ' · ' + escapeHtml(m.base) + ' · ' + escapeHtml(m.key) + '</div>';        var actionsHtml = '';        if (!isActive) {          actionsHtml += '<button class="btn btn-p" onclick="setActive(\'' + m.id + '\')">设为当前</button>';        }        actionsHtml += '<button class="btn btn-s" onclick="copyModel(\'' + m.id + '\')"><i class="fas fa-copy"></i> 复制</button>';        actionsHtml += '<button class="btn" onclick="editModel(\'' + m.id + '\',\'' + escapeHtml(m.name) + '\',\'' + escapeHtml(m.base) + '\',\'' + escapeHtml(m.model) + '\')"><i class="fas fa-pen-to-square"></i> 编辑</button>';        actionsHtml += '<button class="btn btn-d" onclick="deleteModel(\'' + m.id + '\',\'' + escapeHtml(m.name) + '\')">删除</button>';        return '<div class="model-item' + (isActive ? ' active' : '') + '"><div class="info">' + nameHtml + detailHtml + '</div><div class="actions">' + actionsHtml + '</div></div>';      }).join('');    })    .catch(function(e){      document.getElementById('modelList').innerHTML = '<div class="empty" style="color:var(--danger)">加载失败: ' + e.message + '</div>';    });}/* ── Save (add or update) ── */function saveModel() {  var name = document.getElementById('fName').value.trim();  var base = document.getElementById('fBase').value.trim();  var key = document.getElementById('fKey').value.trim();  var model = document.getElementById('fModel').value.trim();  if (!name || !base || !key || !model) {    alert('请填写所有字段');    return;  }  var action = _editId ? 'edit' : 'add';  var payload = {action: action, name: name, base: base, key: key, model: model};  if (_editId) payload.id = _editId;  fetch(CONFIG_API + '/api/vision-models', {    method: 'POST',    headers: {'Content-Type': 'application/json'},    body: JSON.stringify(payload)  })  .then(function(r){return r.json()})  .then(function(data){    if (data.status === 'ok') {      alert(action === 'add' ? '视觉模型已添加' : '视觉模型已更新');      clearForm();      loadVisionModels();    } else {      alert((action === 'add' ? '添加' : '更新') + '失败: ' + (data.error || ''));    }  })  .catch(function(e){alert((action === 'add' ? '添加' : '更新') + '失败: ' + e.message);});}/* ── Copy ── */function copyModel(id) {  fetch(CONFIG_API + '/api/vision-models', {    method: 'POST',    headers: {'Content-Type': 'application/json'},    body: JSON.stringify({action: 'copy', id: id})  })  .then(function(r){return r.json()})  .then(function(data){    if (data.status === 'ok') {      alert('已复制, 新名称: ' + (data.name || ''));      loadVisionModels();    } else {      alert('复制失败: ' + (data.error || ''));    }  })  .catch(function(e){alert('复制失败: ' + e.message);});}/* ── Edit ── */function editModel(id, name, base, model) {  _editId = id;  document.getElementById('fName').value = name;  document.getElementById('fBase').value = base;  document.getElementById('fModel').value = model;  // Key is masked in list, need to fetch full  fetch(CONFIG_API + '/api/vision-models-raw')    .then(function(r){return r.json()})    .then(function(data){      var found = (data.list || []).find(function(m){ return m.id === id; });      if (found) document.getElementById('fKey').value = found.key;    })    .catch(function(){});  document.querySelector('.card-header').innerHTML = '<i class="fas fa-pen-to-square" style="color:var(--primary);"></i> 编辑视觉模型 <span style="font-size:12px;font-weight:400;color:var(--text-3);margin-left:4px;">(' + escapeHtml(name) + ')</span>';  document.querySelector('.form-actions .btn-p').textContent = '更新模型';  // Scroll to form  document.querySelector('.card').scrollIntoView({behavior:'smooth'});}function setActive(id) {  fetch(CONFIG_API + '/api/vision-models', {    method: 'POST',    headers: {'Content-Type': 'application/json'},    body: JSON.stringify({action: 'set-active', id: id})  })  .then(function(r){return r.json()})  .then(function(data){    if (data.status === 'ok') {      loadVisionModels();    } else {      alert('设置失败: ' + (data.error || ''));    }  })  .catch(function(e){alert('设置失败: ' + e.message);});}function deleteModel(id, name) {  if (!confirm('确定删除视觉模型 "' + name + '" 吗？')) return;  fetch(CONFIG_API + '/api/vision-models', {    method: 'POST',    headers: {'Content-Type': 'application/json'},    body: JSON.stringify({action: 'delete', id: id})  })  .then(function(r){return r.json()})  .then(function(data){    if (data.status === 'ok') {      loadVisionModels();    } else {      alert('删除失败: ' + (data.error || ''));    }  })  .catch(function(e){alert('删除失败: ' + e.message);});}function clearForm() {  _editId = null;  document.getElementById('fName').value = '';  document.getElementById('fBase').value = '';  document.getElementById('fKey').value = '';  document.getElementById('fModel').value = '';  document.getElementById('importSelect').value = '';  document.querySelector('.card-header').innerHTML = '<i class="fas fa-plus" style="color:var(--primary);"></i> 添加视觉模型';  document.querySelector('.form-actions .btn-p').textContent = '保存模型';}function escapeHtml(s) {  var div = document.createElement('div');  div.textContent = s || '';  return div.innerHTML;}loadImportOptions();loadVisionModels();</script></body></html>
