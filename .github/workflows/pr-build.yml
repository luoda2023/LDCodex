name: PR build artifacts

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-artifacts:
    name: Windows artifacts
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install NSIS
        run: choco install nsis -y

      - name: Install frontend dependencies
        working-directory: apps/codex-plus-manager
        run: npm install

      - name: Install bridge dependencies
        working-directory: bridge
        run: npm install

      #- name: TypeScript check (skipped - use vite:build instead)
      #  working-directory: apps/codex-plus-manager
      #  run: npm run check

      - name: Build frontend
        working-directory: apps/codex-plus-manager
        run: npm run vite:build

      #- name: Rust tests
      #  run: cargo test --workspace

      - name: Build release binaries
        run: |
          cargo clean
          cargo build --release

      - name: Stage Windows app files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/windows/app | Out-Null
          Copy-Item target/release/ldcodex.exe dist/windows/app/
          Copy-Item target/release/ldcodex-manager.exe dist/windows/app/
          Copy-Item target/release/ldzcode.exe dist/windows/app/
          # ★ Node.js 不打包进安装包！launcher 首次运行时自动检测/下载
          # ★ 复制 bridge 目录
          Copy-Item -Recurse -Force bridge dist/windows/app/bridge/
          # ★ 安装 bridge 依赖
          Push-Location dist/windows/app/bridge
          npm install --production
          Pop-Location
          Write-Host "Staged files:"
          Get-ChildItem dist/windows/app -Recurse -File | Select-Object FullName | Format-Table -AutoSize

      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v", "V")
          $version = $version -replace '[\\/]', '-'
          if (-not $version -or $version -eq "main") {
            $version = "0.0.0-${{ github.run_number }}"
          }
          $makensis = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) {
            $makensis = "makensis"
          }
          Push-Location scripts/installer/windows
          & $makensis "/INPUTCHARSET" "UTF8" "/DVERSION=$version" LDAI.nsi
          Pop-Location

      - name: Upload Windows binaries
        uses: actions/upload-artifact@v4
        with:
          name: ldai-windows-binaries
          path: dist/windows/app/*
          if-no-files-found: error

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: ldai-windows-installer
          path: dist/windows/*.exe
          if-no-files-found: error

  macos-dmg:
    name: macOS DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
          - arch: arm64
            runner: macos-14
            target: aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: apps/codex-plus-manager
        run: npm install

      - name: Install bridge dependencies
        working-directory: bridge
        run: npm install

      - name: Build frontend
        working-directory: apps/codex-plus-manager
        run: npm run vite:build

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build macOS DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION#V}"
          VERSION="${VERSION//\//-}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "main" ]; then
            VERSION="0.0.0-${GITHUB_RUN_NUMBER}"
          fi
          BINARY_DIR="$PWD/target/${{ matrix.target }}/release" bash scripts/installer/macos/package-dmg.sh "$VERSION" "${{ matrix.arch }}"

      - name: Verify macOS bundle structure
        run: |
          set -euo pipefail
          for app in "dist/macos/stage/LDCodex.app" "dist/macos/stage/LDAI管理工具.app" "dist/macos/stage/LDZcode.app"; do
            test -f "$app/Contents/Info.plist"
            test -f "$app/Contents/PkgInfo"
            test -x "$app/Contents/MacOS/$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app/Contents/Info.plist")"
            plutil -lint "$app/Contents/Info.plist" >/dev/null
            codesign -dv "$app" >/dev/null 2>&1
            echo "verified: $app"
          done

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: ldai-macos-${{ matrix.arch }}-dmg
          path: dist/macos/*.dmg
          if-no-files-found: error

  release:
    name: Create Release
    if: github.event_name == 'push' && github.ref_name == 'main'
    needs: [windows-artifacts, macos-dmg]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ldai-windows-installer
          path: release-artifacts

      - uses: actions/download-artifact@v4
        with:
          name: ldai-windows-binaries
          path: release-artifacts

      - uses: actions/download-artifact@v4
        with:
          name: ldai-macos-x64-dmg
          path: release-artifacts

      - uses: actions/download-artifact@v4
        with:
          name: ldai-macos-arm64-dmg
          path: release-artifacts

      - name: Extract version from Cargo.toml
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | sed 's/.*"\(.*\)"/\1/' | head -1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"

          # 删除旧 Release 和 tag（如果存在）
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true

          # 创建新 Release
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "🚀 自动构建 #${{ github.run_number }}
            提交: ${{ github.sha }}" \
            --prerelease \
            --latest

          # 重新打包 ldai-windows-binaries 为 zip（download-artifact 会解压）
          cd release-artifacts
          if [ -f ldcodex.exe ]; then
            zip -j ldai-windows-binaries.zip ldcodex.exe ldcodex-manager.exe ldzcode.exe 2>/dev/null || true
          fi
          cd "$OLDPWD"

          # 上传产物
          for f in release-artifacts/*.zip release-artifacts/*.exe release-artifacts/*.dmg; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" || true
          done

