name: PR build artifacts

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-artifacts:
    name: Windows artifacts
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install NSIS
        run: choco install nsis -y

      - name: Install frontend dependencies
        working-directory: apps/codex-plus-manager
        run: npm install

      - name: Install bridge dependencies
        working-directory: bridge
        run: npm install

      #- name: TypeScript check (skipped - use vite:build instead)
      #  working-directory: apps/codex-plus-manager
      #  run: npm run check

      - name: Build frontend
        working-directory: apps/codex-plus-manager
        run: npm run vite:build

      #- name: Rust tests
      #  run: cargo test --workspace

      - name: Build release binaries
        run: cargo build --release

      - name: Stage Windows app files
        shell: pwsh
        env:
          NODEJS_VERSION: 22.16.0
        run: |
          New-Item -ItemType Directory -Force dist/windows/app | Out-Null
          Copy-Item target/release/ldcodex.exe dist/windows/app/
          Copy-Item target/release/ldcodex-manager.exe dist/windows/app/
          # ★ 下载 Node.js 运行时（单文件 exe，约 25MB）
          $nodeDir = "dist/windows/app/node-portable"
          New-Item -ItemType Directory -Force $nodeDir | Out-Null
          $nodeUrl = "https://nodejs.org/dist/v${{ env.NODEJS_VERSION }}/win-x64/node.exe"
          Write-Host "Downloading node.exe from $nodeUrl"
          Invoke-WebRequest -Uri $nodeUrl -OutFile "$nodeDir
ode.exe" -UseBasicParsing
          $nodeSize = (Get-Item "$nodeDir
ode.exe").Length
          Write-Host "node.exe downloaded: $([math]::Round($nodeSize/1MB, 2)) MB"
          # ★ 复制 bridge 目录（包含 index.mjs、lib/、package.json 等）
          Copy-Item -Recurse -Force bridge dist/windows/app/bridge/
          # ★ 安装 bridge 依赖
          Push-Location dist/windows/app/bridge
          npm install --production
          Pop-Location
          Write-Host "Staged files:"
          Get-ChildItem dist/windows/app -Recurse -File | Select-Object FullName | Format-Table -AutoSize
          Get-ChildItem dist/windows/app -Recurse -File | Select-Object FullName | Format-Table -AutoSize

      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v", "V")
          $version = $version -replace '[\\/]', '-'
          if (-not $version -or $version -eq "main") {
            $version = "0.0.0-${{ github.run_number }}"
          }
          $makensis = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) {
            $makensis = "makensis"
          }
          Push-Location scripts/installer/windows
          & $makensis "/INPUTCHARSET" "UTF8" "/DVERSION=$version" LDCodex.nsi
          Pop-Location

      - name: Upload Windows binaries
        uses: actions/upload-artifact@v4
        with:
          name: ldcodex-windows-binaries
          path: dist/windows/app/*
          if-no-files-found: error

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: ldcodex-windows-installer
          path: dist/windows/*.exe
          if-no-files-found: error

  macos-dmg:
    name: macOS DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
          - arch: arm64
            runner: macos-14
            target: aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: apps/codex-plus-manager
        run: npm install

      - name: Install bridge dependencies
        working-directory: bridge
        run: npm install

      - name: Build frontend
        working-directory: apps/codex-plus-manager
        run: npm run vite:build

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build macOS DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION#V}"
          VERSION="${VERSION//\//-}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "main" ]; then
            VERSION="0.0.0-${GITHUB_RUN_NUMBER}"
          fi
          BINARY_DIR="$PWD/target/${{ matrix.target }}/release" bash scripts/installer/macos/package-dmg.sh "$VERSION" "${{ matrix.arch }}"

      - name: Verify macOS bundle structure
        run: |
          set -euo pipefail
          for app in "dist/macos/stage/LDCodex.app" "dist/macos/stage/LDCodex 管理工具.app"; do
            test -f "$app/Contents/Info.plist"
            test -f "$app/Contents/PkgInfo"
            test -x "$app/Contents/MacOS/$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app/Contents/Info.plist")"
            plutil -lint "$app/Contents/Info.plist" >/dev/null
            codesign -dv "$app" >/dev/null 2>&1
            echo "verified: $app"
          done

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: ldcodex-macos-${{ matrix.arch }}-dmg
          path: dist/macos/*.dmg
          if-no-files-found: error

